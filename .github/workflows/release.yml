name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: 'go.sum'

      - name: Download dependencies
        run: go mod download

      - name: Tidy go.mod
        run: go mod tidy

      - name: Build release binaries
        run: |
          mkdir -p release
          
          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o release/downloader-linux-amd64 ./cmd/downloader
          
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o release/downloader-linux-arm64 ./cmd/downloader
          
          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o release/downloader-darwin-amd64 ./cmd/downloader
          
          # macOS arm64
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o release/downloader-darwin-arm64 ./cmd/downloader
          
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o release/downloader-windows-amd64.exe ./cmd/downloader
          
          # List built files
          ls -la release/

      - name: Create tar.gz archives
        run: |
          cd release
          for file in *; do
            if [ -f "$file" ]; then
              tar -czf "${file}.tar.gz" "$file"
            fi
          done
          cd ..

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: release/
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
